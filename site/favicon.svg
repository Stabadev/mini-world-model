<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- fond arrondi bleu -->
  <rect width="32" height="32" rx="7" fill="#2563EB"/>
  <!-- grille 3×3 (cases intérieures, murs exclus) -->
  <!-- lignes verticales -->
  <line x1="12" y1="6" x2="12" y2="26" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="20" y1="6" x2="20" y2="26" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- lignes horizontales -->
  <line x1="6" y1="12" x2="26" y2="12" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="6" y1="20" x2="26" y2="20" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- bordure extérieure -->
  <rect x="5.5" y="5.5" width="21" height="21" rx="2" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- agent (petit carré blanc) -->
  <rect x="7" y="7" width="4" height="4" rx="1" fill="white" fill-opacity="0.95"/>
  <!-- boîte (carré orange) -->
  <rect x="15" y="15" width="4" height="4" rx="1" fill="#FCD34D"/>
  <!-- cible (petit point vert) -->
  <circle cx="23" cy="23" r="2.2" fill="#4ADE80"/>
</svg>
